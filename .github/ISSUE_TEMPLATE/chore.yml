name: 기타 작업
description: 설정 변경, 의존성 업데이트, 빌드·CI 스크립트 수정 등 기타 작업을 제안합니다.
title: "[CHORE] "
labels:
  - CHORE
body:
  - type: textarea
    id: content
    attributes:
      label: 작업 내용
      description: 어떤 작업을 하는지 작성해주세요.
      placeholder: 예) CI 워크플로 트리거를 main으로 향하는 PR로 한정합니다.
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적
      description: 왜 이 작업이 필요한지 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 변경 범위
      description: 영향을 받는 파일, 설정, 환경 등을 나열해주세요.
      placeholder: |
        - .github/workflows/ci.yml
        - package.json
