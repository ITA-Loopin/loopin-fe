name: 버그 제보
description: 발견한 오류나 예상과 다르게 동작하는 문제를 제보합니다.
title: "[FIX] "
labels:
  - FIX
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했는지 작성해주세요.
      placeholder: 예) iOS에서 입력창을 선택하면 화면이 자동으로 확대됩니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 확인할 수 있는 과정을 작성해주세요.
      placeholder: |
        1. AI 플래너 페이지로 이동합니다.
        2. 텍스트 입력창을 선택합니다.
        3. 화면이 확대되는 것을 확인합니다.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 어떻게 동작해야 하는지 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: 참고 자료
      description: 스크린샷, 영상, 기기 정보 등 참고할 내용을 첨부해주세요.
