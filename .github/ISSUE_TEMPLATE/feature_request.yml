name: 기능 요청
description: 새로운 기능이나 개선 사항을 제안합니다.
title: "[FEAT] "
labels:
  - FEAT
body:
  - type: textarea
    id: background
    attributes:
      label: 작업 목적
      description: 이 기능이나 개선이 필요한 이유를 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 작업 내용
      description: 구현하거나 변경해야 할 내용을 작성해주세요.
      placeholder: |
        - [ ] 작업 항목 1
        - [ ] 작업 항목 2
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: 참고 자료
      description: Figma 링크, 스크린샷, 관련 문서가 있다면 첨부해주세요.
