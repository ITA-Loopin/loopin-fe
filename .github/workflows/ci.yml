name: CI

# PR 검증 게이트: 타입체크 · 린트 · 유닛 테스트 · 빌드(패키징 검증)까지 통과해야 머지.
# 배포(CD)는 Vercel이 main push를 감지해 자동 수행하므로 여기서는 다루지 않는다.
on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

# 같은 브랜치에서 새 커밋이 오면 진행 중인 실행을 취소해 러너를 아낀다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # packageManager 필드(pnpm@10.18.0)에서 버전을 읽어 설치한다.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 빌드 전에 실행해야 .next 산출물 없이 src/ 기준으로 깔끔하게 타입 검사된다.
      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      # next build 자체가 타입/컴파일/번들 무결성을 검증하는 패키징 게이트 역할을 한다.
      - name: Build
        run: pnpm build
