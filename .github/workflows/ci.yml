name: CI

# PR 검증 게이트: 아래 잡을 모두 통과해야 머지.
#   - verify:       타입체크 · 유닛 테스트 · 빌드(패키징 검증)
#   - lint-changed: 이 PR이 추가/수정한 파일만 lint(ratchet). 기존 코드 부채(error 35건)는
#                   전체 게이트를 막으므로 별도 소각 이슈로 분리하고, 여기서는 새 부채 유입만 막는다.
#                   eslint 기본 동작상 error는 차단·warning은 비차단이며, 변경파일에 남은
#                   기존 error도 함께 막히므로(boy-scout) 만진 파일은 정리하고 올린다.
#   - scripts:      automation/bin 게이트 스크립트의 shellcheck + 스모크 테스트.
#                   lint-changed가 이 스크립트를 실행하므로, 스크립트 회귀(특히 fail-open화)를
#                   여기서 막는다.
#   - gitleaks:     git 히스토리 전체 시크릿 스캔. 확인된 오탐(Firebase Web API 키)은
#                   .gitleaks.toml에서 경로 한정으로 allowlist한다.
# main으로 향하는 PR에서만 돈다. 머지 후 push 검증은 Vercel 배포와
# 무관한 중복 실행이라 두지 않으며, 배포(CD)는 Vercel이 main push를 감지해 자동 수행한다.
on:
  pull_request:
    branches: [main]

# 같은 브랜치에서 새 커밋이 오면 진행 중인 실행을 취소해 러너를 아낀다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# 주의: verify·lint-changed의 잡 name은 main 브랜치 보호의 required status checks에 등록돼 있다.
# 이름을 바꾸면 브랜치 보호 설정도 함께 갱신해야 한다 (안 하면 머지가 영구 차단됨).
# scripts 잡은 아직 required가 아니다 — 다만 머지 게이트(automation/bin/merge-gate.sh)가
# 모든 체크의 성공을 요구하므로 ship 경로에서는 사실상 차단 게이트로 동작한다.
jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # packageManager 필드(pnpm@10.18.0)에서 버전을 읽어 설치한다.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build를 먼저 실행해 next-env.d.ts와 .next/types(typedRoutes 등)를 생성해야
      # 이어지는 tsc가 정적 에셋(*.svg)·라우트 타입을 해석할 수 있다(fresh 체크아웃엔 없음).
      # next build 자체도 타입/컴파일/번들 무결성을 검증하는 패키징 게이트다.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

  # 변경파일 한정 lint(ratchet). build가 필요 없어 verify와 병렬로 빠르게 돌린다.
  lint-changed:
    name: lint (changed files)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # base·head 두 커밋으로 diff를 계산해야 하므로 전체 히스토리를 받는다.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 대상 산출·실행 로직은 로컬 선검증(ship Phase 2 게이트 B)과 공유하는 단일 스크립트에 있다.
      - name: Lint changed files (ratchet)
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: automation/bin/lint-changed.sh "$BASE_SHA" "$HEAD_SHA"

  # automation/bin 게이트 스크립트 검증. node·pnpm이 필요 없어 수 초 안에 끝난다.
  # shellcheck·jq는 ubuntu-latest 러너에 기본 설치돼 있다.
  scripts:
    name: scripts (shellcheck · smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck
        run: shellcheck automation/bin/*.sh

      - name: Smoke test
        run: automation/bin/smoke-test.sh

  # git 히스토리 전체 시크릿 스캔. gitleaks-action은 조직 리포에서 라이선스 키가 필요하므로
  # MIT인 바이너리를 릴리스에서 받아 직접 실행한다. 설정·allowlist는 .gitleaks.toml.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 히스토리 전체를 스캔하므로 전체 클론이 필요하다.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks

      - name: Scan git history
        run: ./gitleaks git --redact --no-banner
